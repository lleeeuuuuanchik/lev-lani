<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="g1" cx="70%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#c4818b" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#080a0c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="15%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#6e4a80" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#080a0c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="grad-text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c4818b"/>
      <stop offset="60%" stop-color="#e8d5be"/>
      <stop offset="100%" stop-color="#d49aa3"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.8" fill="white" fill-opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#080a0c"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>

  <!-- Top border line -->
  <rect x="0" y="0" width="1200" height="1" fill="url(#grad-text)" fill-opacity="0.25"/>

  <!-- Left accent bar -->
  <rect x="80" y="200" width="2" height="230" fill="url(#grad-text)" fill-opacity="0.4" rx="1"/>

  <!-- Location badge -->
  <rect x="106" y="196" width="170" height="26" rx="13" fill="#c4818b" fill-opacity="0.1"/>
  <rect x="106" y="196" width="170" height="26" rx="13" fill="none" stroke="#c4818b" stroke-opacity="0.3" stroke-width="1"/>
  <circle cx="122" cy="209" r="3" fill="#c4818b"/>
  <text x="132" y="214" font-family="Inter, sans-serif" font-size="10" font-weight="600" letter-spacing="1.5" fill="#c4818b" text-transform="uppercase">ВЛАДИКАВКАЗ</text>

  <!-- Main title: Lev -->
  <text x="104" y="310" font-family="Georgia, serif" font-size="130" font-weight="300" font-style="italic" fill="#f0ece8" letter-spacing="-2">Lev</text>

  <!-- Ampersand -->
  <text x="104" y="370" font-family="Georgia, serif" font-size="56" font-weight="300" font-style="italic" fill="url(#grad-text)" letter-spacing="4">&amp;</text>

  <!-- Lani -->
  <text x="160" y="370" font-family="Georgia, serif" font-size="130" font-weight="300" font-style="italic" fill="url(#grad-text)" letter-spacing="-2">Lani</text>

  <!-- Subtitle -->
  <text x="106" y="408" font-family="Inter, sans-serif" font-size="13" font-weight="400" letter-spacing="3.5" fill="#f0ece8" fill-opacity="0.38">BEAUTY STUDIO · С 2015 ГОДА</text>

  <!-- Divider -->
  <rect x="106" y="422" width="320" height="1" fill="url(#grad-text)" fill-opacity="0.2"/>

  <!-- Right side decorative sphere -->
  <defs>
    <radialGradient id="sphere" cx="35%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#d7a0aa"/>
      <stop offset="32%" stop-color="#a85a6c"/>
      <stop offset="65%" stop-color="#410c1c"/>
      <stop offset="100%" stop-color="#0c0206"/>
    </radialGradient>
  </defs>
  <circle cx="920" cy="315" r="180" fill="url(#sphere)" opacity="0.9"/>
  <ellipse cx="870" cy="265" rx="55" ry="30" fill="white" fill-opacity="0.07" transform="rotate(-30 870 265)"/>

  <!-- Orbit rings -->
  <ellipse cx="920" cy="315" rx="230" ry="80" fill="none" stroke="#c4818b" stroke-opacity="0.18" stroke-width="1" transform="rotate(-25 920 315)"/>
  <ellipse cx="920" cy="315" rx="280" ry="110" fill="none" stroke="#e8d5be" stroke-opacity="0.10" stroke-width="1" transform="rotate(15 920 315)"/>

  <!-- Orbit dots -->
  <circle cx="1115" cy="280" r="6" fill="#c4818b" fill-opacity="0.8"/>
  <circle cx="1130" cy="340" r="4" fill="#e8d5be" fill-opacity="0.6"/>
  <circle cx="720" cy="360" r="5" fill="#c4818b" fill-opacity="0.7"/>

  <!-- Stars -->
  <circle cx="680" cy="120" r="1.5" fill="white" fill-opacity="0.35"/>
  <circle cx="740" cy="90" r="1" fill="white" fill-opacity="0.25"/>
  <circle cx="800" cy="150" r="2" fill="#c4818b" fill-opacity="0.4"/>
  <circle cx="1050" cy="80" r="1.5" fill="white" fill-opacity="0.3"/>
  <circle cx="1120" cy="140" r="1" fill="white" fill-opacity="0.2"/>
  <circle cx="1150" cy="480" r="1.8" fill="#c4818b" fill-opacity="0.35"/>
  <circle cx="700" cy="500" r="1.2" fill="white" fill-opacity="0.2"/>

  <!-- Bottom info -->
  <text x="106" y="550" font-family="Inter, sans-serif" font-size="15" fill="#f0ece8" fill-opacity="0.5">ул. Астана Кесаева, 4 · +7 (962) 748-83-83 · levlani.ru</text>
</svg>
